# Activate conda env using:
  # conda env create -f stats.yaml
  # conda activate stats

# Update environment using:
  # conda env update --file stats.yaml --prune

name: stats
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base=4.2.2
  - r-seurat=4.3.0
  - r-seuratobject=4.1.3
  - r-qs=0.25.7
  - r-tidyverse=1.3.2
  - r-ggpubr
  - r-rstatix
  - r-argparse=2.2.2
  - r-ggsignif