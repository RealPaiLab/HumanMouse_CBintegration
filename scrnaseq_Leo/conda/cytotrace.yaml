# Activate conda env using:
  # conda env create -f cytotrace.yaml
  # conda activate cytotrace

# Update environment using:
  # conda env update --file cytotrace.yaml --prune

name: cytotrace
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base=4.2.2
  - r-seurat=4.3.0
  - r-seuratobject=4.1.3
  - r-qs=0.25.7
  - r-tidyverse=1.3.2
  - r-argparse=2.2.2