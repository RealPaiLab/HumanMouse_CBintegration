# Based on packages in docker image from: 2024-02-27

# Activate conda env using:
  # conda env create -f scrnaseq_parallel_env.yaml
  # conda activate scrnaseq_parallel_env

# Update environment using:
  # conda env update --file scrnaseq_parallel_env.yaml --prune

name: scrnaseq_parallel_env
channels:
  - conda-forge
  - bioconda
  - pwwang
dependencies:
  - r-base=4.2.2
  - bioconductor-biomart=2.54
  - r-tidyverse=1.3.2 
  - r-rcpp=1.0.10
  - r-seurat=4.3.0
  - r-seuratobject=4.1.3
  - r-harmony=1.1
  - r-rcolorbrewer=1.1_3
  - r-matrix=1.5.3
  - r-future=1.33.1
  - r-argparse=2.2.2
  - r-qs=0.25.7
  - r-seuratwrappers=0.3.1
  - r-devtools=2.4.5