# Activate conda env using:
  # conda env create -f celltypist.yaml
  # conda activate celltypist

# Update environment using:
  # conda env update --file celltypist.yaml --prune

name: celltypist
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base=4.2.2
  - r-seurat=4.3.0
  - r-seuratobject=4.1.3
  - r-qs=0.25.7
  - celltypist
  - ipykernel=6.15.2=py310h06a4308_0
  - r-devtools=2.4.5