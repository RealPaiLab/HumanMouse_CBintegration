# Activate conda env using:
  # conda env create -f singleCellNet.yaml
  # conda activate singleCellNet

# Update environment using:
  # conda env update --file singleCellNet.yaml --prune

name: singleCellNet
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base=4.2.2
  - r-tidyverse=1.3.2 
  - r-rcpp=1.0.10
  - r-seurat=4.3.0
  - r-seuratobject=4.1.3
  - r-rcolorbrewer=1.1_3
  - r-qs=0.25.7
  - r-singlecellnet