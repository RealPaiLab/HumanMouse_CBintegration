# Activate conda env using:
  # conda env create -f clustree.yaml
  # conda activate clustree

# Update environment using:
  # conda env update --file clustree.yaml --prune

name: clustree
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base=4.3
  - r-tidyverse
  - r-seurat=4.3.0
  - r-qs=0.25.7
  - r-clustree
  - r-igraph=1.5.0
  - r-presto=1.0.0
  - r-gprofiler2
  - r-argparse=2.2.2